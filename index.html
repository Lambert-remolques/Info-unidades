<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades | Lambert</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde: #159947;
            --verde-oscuro: #078334;
            --rojo: #da251d;
            --negro: #262626;
            --grafito: #333333;
            --gris: #e6e6e6;
            --gris-texto: #555555;
            --blanco: #ffffff;
            --sombra-card: 0 4px 14px rgba(38, 38, 38, 0.15);
            --sombra-panel: 0 10px 28px rgba(38, 38, 38, 0.10);
            --fuente: "Montserrat", Arial, sans-serif;
            --radio: 3px;
        }
#55555
        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--negro);
            font-family: var(--fuente);
            background:
                linear-gradient(90deg, rgba(38, 38, 38, 0.045) 1px, transparent 1px),
                linear-gradient(0deg, rgba(38, 38, 38, 0.035) 1px, transparent 1px),
                #f8f8f8;
            background-size: 64px 64px;
        }

        button,
        a {
            font: inherit;
        }

        button {
            border: 0;
        }

        .button-reset {
            width: 100%;
            color: inherit;
            text-align: left;
            background: transparent;
            cursor: pointer;
        }

        .top-nav {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 30px;
        }

        .site-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 7px;
        }

        .menu-button {
            min-height: 34px;
            padding: 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: var(--radio);
            color: rgba(255, 255, 255, 0.78);
            background: rgba(255, 255, 255, 0.04);
            font-size: 0.72rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            cursor: pointer;
            touch-action: manipulation;
            transition: color 160ms ease, background 160ms ease, border-color 160ms ease;
        }

        .menu-button.active {
            color: var(--blanco);
            border-color: var(--verde);
            background: rgba(21, 153, 71, 0.32);
        }

        @media (hover: hover) {
            .menu-button:hover {
                color: var(--blanco);
                border-color: var(--verde);
                background: rgba(21, 153, 71, 0.32);
            }
        }

        .hero {
            position: relative;
            min-height: 300px;
            overflow: hidden;
            color: var(--blanco);
            background:
                radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.08), transparent 24%),
                linear-gradient(135deg, #101213 0%, #191c1d 44%, #242728 100%);
            box-shadow: inset 0 -1px rgba(255, 255, 255, 0.08);
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            top: -70px;
            bottom: -90px;
            width: 190px;
            background: rgba(255, 255, 255, 0.045);
            transform: skewX(-24deg);
            pointer-events: none;
        }

        .hero::before {
            right: 210px;
        }

        .hero::after {
            right: 84px;
            opacity: 0.55;
        }

        .hero-inner {
            position: relative;
            z-index: 1;
            width: min(1280px, calc(100% - 80px));
            margin: 0 auto;
            padding: 28px 0 42px;
        }

        .logo {
            display: block;
            width: 190px;
            height: auto;
            margin: 0;
            filter: drop-shadow(0 4px 9px rgba(0, 0, 0, 0.45));
        }

        .hero-content {
            position: relative;
            max-width: 960px;
            padding-left: 26px;
        }

        .hero-content::before {
            content: "";
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 0;
            width: 3px;
            background: var(--verde);
        }

        .hero-kicker {
            margin: 0 0 12px;
            color: var(--verde);
            font-size: clamp(0.9rem, 1.2vw, 1.08rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.05;
        }

        .hero-title {
            margin: 0;
            color: var(--blanco);
            font-size: clamp(2.15rem, 6vw, 4.9rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.94;
            letter-spacing: 0;
            text-shadow: 0 7px 14px rgba(0, 0, 0, 0.32);
            white-space: nowrap;
        }

        .red-rule {
            width: 64px;
            height: 4px;
            margin: 19px 0 14px;
            background: var(--rojo);
        }

        .hero-description {
            margin: 0;
            color: rgba(255, 255, 255, 0.78);
            font-size: clamp(0.9rem, 1.3vw, 1.05rem);
            font-weight: 500;
            line-height: 1.55;
        }

        .category-panel {
            position: sticky;
            top: 56px;
            z-index: 20;
            width: min(1280px, calc(100% - 112px));
            margin: -1px auto 0;
            padding: 22px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--sombra-panel);
        }

        .category-panel[hidden] {
            display: none;
        }

        .category-list {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 22px;
        }

        .category-button {
            position: relative;
            min-height: 48px;
            padding: 0 18px;
            border-radius: var(--radio);
            color: var(--blanco);
            background: linear-gradient(180deg, var(--verde), var(--verde-oscuro));
            box-shadow: inset 0 1px rgba(255, 255, 255, 0.14);
            cursor: pointer;
            transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
        }

        .category-button::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -11px;
            width: 0;
            height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-top: 11px solid var(--negro);
            opacity: 0;
            transform: translateX(-50%) translateY(-4px);
            transition: opacity 160ms ease, transform 160ms ease;
        }

        .category-button:hover,
        .category-button.active {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 9px 18px rgba(21, 153, 71, 0.24);
        }

        .category-button.active {
            background: linear-gradient(180deg, var(--negro), #151515);
            box-shadow: 0 10px 22px rgba(38, 38, 38, 0.22);
        }

        .category-button.active::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .category-name {
            display: block;
            font-size: clamp(0.82rem, 1.25vw, 1.02rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1;
            white-space: nowrap;
        }

        main {
            width: min(1280px, calc(100% - 112px));
            margin: 0 auto;
            padding: 36px 0 56px;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 260ms ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-head {
            margin-bottom: 20px;
        }

        .section-title-wrap {
            display: inline-grid;
            grid-template-columns: 5px auto;
            align-items: end;
            column-gap: 18px;
            padding-bottom: 5px;
            border-bottom: 2px solid rgba(21, 153, 71, 0.82);
            min-width: min(435px, 100%);
        }

        .section-title-wrap::before {
            content: "";
            width: 5px;
            height: 36px;
            background: var(--verde);
        }

        .section-title {
            margin: 0;
            color: var(--verde);
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.9;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px 26px;
        }

        .home-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 26px;
        }

        .home-card {
            min-height: 230px;
        }

        .product-card {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 168px;
            padding: 23px 24px 18px 28px;
            border-radius: var(--radio);
            border-left: 5px solid var(--verde);
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--sombra-card);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        @media (hover: hover) {
            .product-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 10px 28px rgba(38, 38, 38, 0.20);
            }
        }

        .product-card-button {
            cursor: pointer;
            touch-action: manipulation;
        }

        .product-card-button > * {
            pointer-events: none;
        }

        .product-card-button:focus-visible,
        .sheet-link:focus-visible,
        .back-button:focus-visible,
        .category-button:focus-visible {
            outline: 3px solid rgba(21, 153, 71, 0.38);
            outline-offset: 3px;
        }

        .product-name {
            margin: 0 0 11px;
            color: var(--negro);
            font-size: clamp(1rem, 1.55vw, 1.28rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 1.08;
        }

        .product-description {
            margin: 0 0 16px;
            color: var(--gris-texto);
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.45;
        }

        .divider {
            border: 0;
            height: 1px;
            margin: auto 0 14px;
            background-image: linear-gradient(90deg, rgba(38, 38, 38, 0.20) 45%, transparent 45%);
            background-size: 5px 1px;
        }

        .card-action {
            margin-top: auto;
            color: var(--verde);
            font-size: 0.75rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            margin-bottom: 18px;
            padding: 0 18px;
            border: 1px solid rgba(21, 153, 71, 0.48);
            border-radius: var(--radio);
            color: var(--verde);
            background: var(--blanco);
            font-size: 0.74rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 160ms ease, background 160ms ease, transform 160ms ease;
        }

        .back-button:hover {
            color: var(--blanco);
            background: var(--verde);
            transform: translateX(-2px);
        }

        .sheet-link {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            width: 100%;
            border-radius: var(--radio);
            color: var(--blanco);
            background: linear-gradient(180deg, var(--verde), var(--verde-oscuro));
            font-size: 0.74rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            text-decoration: none;
            transition: filter 160ms ease, transform 160ms ease;
        }

        .sheet-link:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
        }

        .construction-copy {
            max-width: 760px;
            margin: 0 0 24px;
            color: var(--gris-texto);
            font-size: 0.98rem;
            font-weight: 500;
            line-height: 1.55;
        }

        .empty-state {
            padding: 28px;
            border-left: 5px solid var(--verde);
            background: var(--blanco);
            box-shadow: var(--sombra-card);
            color: var(--gris-texto);
            font-weight: 500;
        }

        .search-bar {
            display: none;
        }

        @media (min-width: 721px) {
            .search-bar {
                display: block;
            }

            .top-nav {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 50;
                align-items: center;
                gap: 24px;
                margin-bottom: 0;
                padding: 12px 48px;
                background: linear-gradient(135deg, #101213 0%, #1a1d1e 100%);
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            }

            .top-nav .logo {
                order: 1;
                height: 38px;
                width: auto;
                margin: 0;
                filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
            }

            .top-nav .site-menu {
                order: 2;
                flex: 1;
                justify-content: center;
                gap: 8px;
                padding: 0;
            }

            .top-nav .user-bar {
                order: 3;
                display: flex;
                align-items: center;
                margin: 0;
                padding: 0;
                border: 0;
                gap: 12px;
            }

            .top-nav .menu-button {
                min-height: 38px;
                padding: 0 18px;
                font-size: 0.78rem;
                letter-spacing: 0.04em;
            }

            .top-nav .menu-button.active {
                color: var(--blanco);
                border-color: var(--verde-oscuro);
                background: linear-gradient(180deg, var(--verde), var(--verde-oscuro));
                box-shadow: 0 2px 10px rgba(21, 153, 71, 0.45), inset 0 1px rgba(255, 255, 255, 0.18);
            }

            .hero-inner {
                padding-top: 165px;
                padding-bottom: 56px;
            }

            .hero-content {
                padding-top: 8px;
            }

            .scroll-bar {
                display: none;
            }

            .category-panel {
                top: 124px;
            }

            .search-bar {
                position: fixed;
                top: 64px;
                left: 0;
                right: 0;
                z-index: 45;
                padding: 10px 48px;
                background: rgba(15, 17, 18, 0.96);
                backdrop-filter: blur(8px);
                border-bottom: 2px solid var(--verde);
                box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
            }

            .search-box {
                position: relative;
                width: min(380px, 100%);
                margin-left: auto;
                margin-right: 0;
            }

            #searchInput {
                width: 100%;
                height: 40px;
                padding: 0 16px 0 44px;
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 6px;
                color: var(--blanco);
                background-color: rgba(255, 255, 255, 0.06);
                background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='rgba(255,255,255,0.5)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>");
                background-position: 14px center;
                background-repeat: no-repeat;
                background-size: 18px;
                font-family: var(--fuente);
                font-size: 0.9rem;
                font-weight: 500;
                transition: border-color 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
            }

            #searchInput::placeholder {
                color: rgba(255, 255, 255, 0.45);
            }

            #searchInput:focus {
                outline: none;
                border-color: var(--verde);
                background-color: rgba(255, 255, 255, 0.12);
                box-shadow: 0 0 0 3px rgba(21, 153, 71, 0.28);
            }

            .search-results {
                position: absolute;
                top: calc(100% + 8px);
                left: 0;
                right: 0;
                max-height: 60vh;
                overflow-y: auto;
                background: var(--blanco);
                border-radius: 6px;
                box-shadow: 0 14px 40px rgba(0, 0, 0, 0.4);
            }

            .search-results[hidden] {
                display: none;
            }

            .search-result-item {
                display: flex;
                flex-direction: column;
                gap: 3px;
                width: 100%;
                padding: 12px 18px;
                background: transparent;
                border: 0;
                border-bottom: 1px solid rgba(0, 0, 0, 0.06);
                text-align: left;
                cursor: pointer;
                font-family: var(--fuente);
                transition: background 120ms ease;
            }

            .search-result-item:last-child {
                border-bottom: 0;
            }

            .search-result-item:hover,
            .search-result-item:focus-visible {
                background: #f5f7f6;
                outline: 0;
            }

            .search-result-path {
                color: var(--verde);
                font-size: 0.68rem;
                font-weight: 900;
                font-style: italic;
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }

            .search-result-name {
                color: var(--negro);
                font-size: 0.92rem;
                font-weight: 700;
            }

            .search-empty {
                padding: 16px;
                color: var(--gris-texto);
                font-size: 0.86rem;
                text-align: center;
            }
        }

        @media (max-width: 1100px) {
            .category-panel,
            main {
                width: min(100% - 48px, 1280px);
            }

            .category-list {
                gap: 16px;
            }

            .products-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .home-grid {
                grid-template-columns: 1fr;
            }
        }

        .hero-search-toggle {
            display: none;
        }

        .scroll-bar-search-toggle {
            display: none;
        }

        .search-modal {
            display: none;
        }

        @media (max-width: 720px) {
            .hero {
                min-height: auto;
            }

            .hero-inner {
                width: min(100% - 32px, 1280px);
                padding: 22px 0 50px;
            }

            .logo {
                width: 158px;
            }

            .top-nav {
                align-items: center;
                justify-content: flex-start;
                gap: 12px;
                margin-bottom: 28px;
            }

            .top-nav .logo {
                margin-left: auto;
            }

            .hero-search-toggle {
                display: grid;
                place-items: center;
                width: 30px;
                height: 30px;
                padding: 0;
                border: 0;
                background: transparent;
                color: var(--blanco);
                cursor: pointer;
            }

            .hero-search-toggle svg {
                width: 22px;
                height: 22px;
                stroke: currentColor;
                stroke-width: 2.2;
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .scroll-bar-search-toggle {
                display: grid;
                place-items: center;
                width: 26px;
                height: 26px;
                padding: 0;
                border: 0;
                background: transparent;
                color: var(--blanco);
                cursor: pointer;
            }

            .scroll-bar-search-toggle svg {
                width: 20px;
                height: 20px;
                stroke: currentColor;
                stroke-width: 2.2;
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .search-modal {
                position: fixed;
                inset: 0;
                z-index: 60;
                display: flex;
                flex-direction: column;
                background: #0e1011;
                transform: translateY(-100%);
                transition: transform 240ms ease;
            }

            .search-modal[hidden] {
                display: none;
            }

            .search-modal.open {
                transform: translateY(0);
            }

            .search-modal-header {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 14px 16px;
                border-bottom: 2px solid var(--verde);
            }

            .search-modal-close {
                display: grid;
                place-items: center;
                width: 36px;
                height: 36px;
                padding: 0;
                border: 0;
                background: transparent;
                color: rgba(255, 255, 255, 0.85);
                font-size: 1.7rem;
                line-height: 1;
                cursor: pointer;
                flex-shrink: 0;
            }

            #searchInputModal {
                flex: 1;
                height: 42px;
                padding: 0 14px 0 40px;
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 6px;
                color: var(--blanco);
                background-color: rgba(255, 255, 255, 0.06);
                background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='rgba(255,255,255,0.5)' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>");
                background-position: 12px center;
                background-repeat: no-repeat;
                background-size: 18px;
                font-family: var(--fuente);
                font-size: 0.92rem;
            }

            #searchInputModal::placeholder {
                color: rgba(255, 255, 255, 0.45);
            }

            #searchInputModal:focus {
                outline: none;
                border-color: var(--verde);
                background-color: rgba(255, 255, 255, 0.1);
                box-shadow: 0 0 0 3px rgba(21, 153, 71, 0.25);
            }

            .search-modal-results {
                flex: 1;
                overflow-y: auto;
                padding: 8px 0;
            }

            .search-modal-results .search-result-item {
                display: flex;
                flex-direction: column;
                gap: 3px;
                width: 100%;
                padding: 14px 20px;
                background: transparent;
                border: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
                text-align: left;
                cursor: pointer;
                font-family: var(--fuente);
                color: var(--blanco);
            }

            .search-modal-results .search-result-item:active {
                background: rgba(21, 153, 71, 0.18);
            }

            .search-modal-results .search-result-path {
                color: var(--verde);
                font-size: 0.7rem;
                font-weight: 900;
                font-style: italic;
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }

            .search-modal-results .search-result-name {
                color: var(--blanco);
                font-size: 0.95rem;
                font-weight: 700;
            }

            .search-modal-results .search-empty {
                padding: 24px 20px;
                color: rgba(255, 255, 255, 0.6);
                font-size: 0.88rem;
                text-align: center;
            }

            body.search-open {
                overflow: hidden;
            }

            .site-menu {
                gap: 7px;
            }

            .menu-button {
                min-height: 30px;
                padding: 0 9px;
                font-size: 0.62rem;
            }

            .hero-content {
                padding-left: 20px;
            }

            .hero-title {
                font-size: clamp(1.8rem, 10vw, 3.05rem);
                white-space: normal;
            }

            .category-panel {

    <script>
        const PDF_BASE = "fichas";
        const PDF_PLACEHOLDER = "https://example.com/ficha.pdf";
        const FOTO_PLACEHOLDER = "https://example.com/fotos";
        const CLOUDINARY_CLOUD = "lambert-remolques";
        const CLOUDINARY_BASE = `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload`;
        const FOTO_MAX_POR_GALERIA = 30;

        function pdfFichaUrl(categoria, productoNombre) {
            const productoSlug = crearSlug(productoNombre);
            return `${PDF_BASE}/${categoria}/${productoSlug}.pdf`;
        }

        function cloudinaryFotoUrl(categoria, productoNombre, ejeSlug, numero, transform = "") {
            const productoSlug = crearSlug(productoNombre);
            const ejePath = ejeSlug ? `/${ejeSlug}` : "";
            const tx = transform ? `${transform}/` : "";
            return `${CLOUDINARY_BASE}/${tx}unidades/${categoria}/${productoSlug}${ejePath}/foto-${numero}.jpg`;
        }

        function cargarImagen(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        async function detectarFotos(categoria, productoNombre, ejeSlug) {
            const numeros = [];
            for (let i = 1; i <= FOTO_MAX_POR_GALERIA; i++) {
                const url = cloudinaryFotoUrl(categoria, productoNombre, ejeSlug, i);
                const existe = await cargarImagen(url);
                if (existe) {
                    numeros.push(i);
                } else {
                    break;
                }
            }
            return numeros;
        }

        function opcionesEjes(productoNombre) {
            return [
                { nombre: "2 ejes", descripcion: "Ficha técnica para disposición de dos ejes.", pdf: pdfFichaUrl("acoplados", productoNombre, "2-ejes") },

            ];

        function fichaTecnicaUnificada(categoria, productoNombre) {
            return [
                {
                    nombre: "Ficha técnica",
                    descripcion: "Documento unificado para este carrozado.",
                    pdf: pdfFichaUrl(categoria, productoNombre)
                }
            ];
        }

        function productoConFicha(categoria, nombre, descripcion, fotosOpciones = null) {
            const producto = {
                nombre,
                descripcion,
                opciones: fichaTecnicaUnificada(categoria, nombre)
            };

            if (fotosOpciones?.length) {
                producto.fotosOpciones = fotosOpciones;
            }

            return producto;
        }

        function opcionesPorSeccion(producto, seccion = "fichas") {
            return seccion === "fotos"
                ? (producto.fotosOpciones || producto.opciones || [])
                : (producto.opciones || []);
        }

        const adicionalesCategorias = [

            backToTop.classList.toggle("visible", y > BACK_TO_TOP_THRESHOLD);
        }

        window.addEventListener("scroll", actualizarBarraEstado, { passive: true });
        backToTop.addEventListener("click", () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        function crearBotonesCategoria() {
            categoryList.innerHTML = categorias.map((categoria) => `
                <button class="category-button" type="button" data-category="${categoria.id}" aria-pressed="false">
                    <span class="category-name">${categoria.nombre}</span>
                </button>
            `).join("");
        }

        function actualizarBotones(categoriaActiva) {
            document.querySelectorAll(".category-button").forEach((button) => {
                const activo = button.dataset.category === categoriaActiva;
                button.classList.toggle("active", activo);
                button.setAttribute("aria-pressed", String(activo));
            });
        }

        function mostrarSeccion(seccion, categoriaId = "acoplados", productoSlug = "") {
            seccionActual = seccion;
            actualizarMenu(seccion);
            actualizarHero(seccion);
            actualizarBreadcrumb(seccion, null);
            categoryPanel.hidden = !(seccion === "fichas" || seccion === "fotos");

            if (seccion === "inicio") {
                mostrarInicio();
                return;
            }

            if (seccion === "adicionales") {
                const adicionalCatValida = adicionalesCategorias.some((c) => c.id === categoriaId);
                mostrarAdicionales(adicionalCatValida ? categoriaId : null);
                return;
            }

            if (productoSlug) {
                mostrarProducto(categoriaId, productoSlug, seccion);
                return;
            }

            mostrarCategoria(categoriaId, seccion);
        }

        function mostrarInicio() {
            catalogView.innerHTML = `
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2 class="section-title">Inicio</h2>
                    </div>
                </div>
                <p class="construction-copy">Catálogo interno con fichas técnicas, fotos y adicionales de cada unidad. Elegí una sección para empezar.</p>
                <div class="home-grid">
                    ${crearTarjetaInicio("Fichas técnicas", "Consulta de fichas PDF por categoría, unidad y configuración.", "fichas")}
                    ${crearTarjetaInicio("Fotos", "Galería de fotos de cada unidad por categoría y configuración.", "fotos")}
                    ${crearTarjetaInicio("Adicionales", "Sección en construcción para próximos recursos complementarios.", "adicionales")}
                </div>
            `;
            history.replaceState(null, "", "#inicio");
        }

        function crearTarjetaInicio(nombre, descripcion, seccion) {
            return `
                <button class="product-card product-card-button button-reset home-card" type="button" data-go-section="${seccion}">
                    <h3 class="product-name">${nombre}</h3>
                    <p class="product-description">${descripcion}</p>
                    <hr class="divider">
                    <span class="card-action">Ingresar</span>
                </button>
            `;
        }

        let adicionalFiltroCategoria = "todos";
        let adicionalBusqueda = "";

        function mostrarAdicionales(categoriaInicial) {
            adicionalFiltroCategoria = categoriaInicial || "todos";
            adicionalBusqueda = "";

            const chipsHtml = ['<button class="adicional-chip" type="button" data-adicional-chip="todos">Todos <span class="chip-count">' + adicionalesPlanos.length + '</span></button>']
                .concat(adicionalesCategorias.map((cat) => `<button class="adicional-chip" type="button" data-adicional-chip="${cat.id}">${cat.nombre} <span class="chip-count">${cat.items.length}</span></button>`))
                .join("");

            catalogView.innerHTML = `
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2 class="section-title">Adicionales</h2>
                    </div>
                </div>
                <p class="construction-copy">Listado completo de adicionales disponibles. Buscá por nombre o filtrá por categoría.</p>

                <div class="adicional-search">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="11" cy="11" r="7"></circle>
                        <path d="m20 20-3.5-3.5"></path>
                    </svg>
                    <input type="search" id="adicionalSearchInput" placeholder="Buscar adicional..." autocomplete="off" aria-label="Buscar adicional">
                </div>

                <div class="adicional-chips" id="adicionalChips">${chipsHtml}</div>

                <div class="adicional-grid" id="adicionalGrid"></div>
            `;

            renderAdicionalesGrid();
            actualizarChips();

            const input = document.getElementById("adicionalSearchInput");
            input.addEventListener("input", (e) => {
                adicionalBusqueda = e.target.value;
                renderAdicionalesGrid();
            });

            const hash = adicionalFiltroCategoria === "todos" ? "#adicionales" : `#adicionales/${adicionalFiltroCategoria}`;
            history.replaceState(null, "", hash);
        }

        function actualizarChips() {
            document.querySelectorAll("[data-adicional-chip]").forEach((chip) => {
                chip.classList.toggle("active", chip.dataset.adicionalChip === adicionalFiltroCategoria);
            });
        }

        function renderAdicionalesGrid() {
            const grid = document.getElementById("adicionalGrid");
            if (!grid) return;
            const q = normalizar(adicionalBusqueda);

            const filtrados = adicionalesPlanos.filter((it) => {
                if (adicionalFiltroCategoria !== "todos" && it.categoriaId !== adicionalFiltroCategoria) return false;
                if (!q) return true;
                const haystack = normalizar(`${it.nombre} ${it.descripcion} ${it.ubicacion} ${it.categoriaNombre}`);
                return haystack.includes(q);
            });

            if (filtrados.length === 0) {
                grid.innerHTML = `<div class="empty-state">Sin resultados para "${adicionalBusqueda}".</div>`;
                return;
            }

            grid.innerHTML = filtrados.map((it) => `
                <button class="adicional-card" type="button" data-adicional-slug="${it.slug}">
                    <div class="adicional-foto adicional-foto-placeholder">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <circle cx="12" cy="12" r="3.5"/>
                            <path d="M8 5l1.5-2h5L16 5"/>
                        </svg>
                        <span>Foto pendiente</span>
                    </div>
                    <div class="adicional-info">
                        <h3 class="adicional-nombre">${it.nombre}</h3>
                        <p class="adicional-ubicacion"><span class="ubicacion-icon" aria-hidden="true">📍</span>${it.ubicacion}</p>
                    </div>
                </button>
            `).join("");
        }

        function abrirAdicionalDetalle(slug) {
            const item = adicionalesPlanos.find((it) => it.slug === slug);
            if (!item) return;
            adicionalDetalleNombre.textContent = item.nombre;
            adicionalDetalleCategoria.textContent = item.categoriaNombre;
            adicionalDetalleDescripcion.textContent = item.descripcion;
            adicionalDetalleUbicacion.textContent = item.ubicacion;
            adicionalDetalleFoto.innerHTML = `
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="5" width="18" height="14" rx="2"/>
                    <circle cx="12" cy="12" r="3.5"/>
                    <path d="M8 5l1.5-2h5L16 5"/>
                </svg>
                <span>Foto pendiente</span>
            `;
            adicionalDetalleModal.hidden = false;
            requestAnimationFrame(() => adicionalDetalleModal.classList.add("open"));
            document.body.classList.add("variantes-open");

        function cerrarAdicionalDetalle() {
            adicionalDetalleModal.classList.remove("open");
            document.body.classList.remove("variantes-open");
            setTimeout(() => {
                adicionalDetalleModal.hidden = true;
            }, 220);
        }

        function mostrarCategoria(idCategoria, seccion = "fichas") {
            seccionActual = seccion;
            actualizarMenu(seccion);
            actualizarHero(seccion);
            categoryPanel.hidden = !(seccion === "fichas" || seccion === "fotos");
            const categoria = categorias.find((item) => item.id === idCategoria) || categorias[0];
            actualizarBotones(categoria.id);
            actualizarBreadcrumb(seccion, categoria.id);

            const productosHtml = categoria.productos.length
                ? categoria.productos.map((producto) => crearTarjetaProducto(producto, seccion)).join("")
                : `<div class="empty-state">Todavía no hay unidades cargadas en esta categoría.</div>`;

            const notaFotos = "";

            catalogView.innerHTML = `
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2 class="section-title">${categoria.nombre}</h2>
                    </div>
                </div>
                ${notaFotos}
                <div class="products-grid">${productosHtml}</div>
            `;

            history.replaceState(null, "", `#${seccion}/${categoria.id}`);
        }

        function crearTarjetaProducto(producto, seccion = "fichas") {
            if (seccion === "fotos") {
                if (opcionesPorSeccion(producto, seccion).length) {
                    return crearTarjetaSeleccion(producto, "Seleccionar unidad", "");
                }

                return `
                    <button class="product-card product-card-button button-reset" type="button" data-galeria-directa="${crearSlug(producto.nombre)}">
                        <h3 class="product-name">${producto.nombre}</h3>
                        <p class="product-description">${producto.descripcion || ""}</p>
                        <hr class="divider">
                        <span class="card-action">Ver fotos</span>
                    </button>
                `;
            }

            if (producto.fichaDirecta) {
                return crearTarjetaAccion(producto.nombre, producto.descripcion, "Ver ficha técnica", producto.pdf || PDF_PLACEHOLDER);
            }

            return crearTarjetaSeleccion(producto, "Seleccionar unidad", producto.descripcion);
        }

        function crearTarjetaSeleccion(producto, accion, descripcion) {
            return `
                <button class="product-card product-card-button button-reset" type="button" data-product="${crearSlug(producto.nombre)}">
                    <h3 class="product-name">${producto.nombre}</h3>
                    <p class="product-description">${descripcion}</p>
                    <hr class="divider">
                    <span class="card-action">${accion}</span>
                </button>
            `;
        }

        function crearTarjetaAccion(nombre, descripcion, textoBoton, url) {
            return `
                <article class="product-card">
                    <h3 class="product-name">${nombre}</h3>
                    <p class="product-description">${descripcion}</p>
                    <hr class="divider">
                    <a class="sheet-link" href="${url}" target="_blank" rel="noopener noreferrer">
                        ${textoBoton}
                    </a>
                </article>
            `;
        }

        function mostrarProducto(idCategoria, slugProducto, seccion = "fichas") {
            const categoria = categorias.find((item) => item.id === idCategoria) || categorias[0];
            const producto = categoria.productos.find((item) => crearSlug(item.nombre) === slugProducto);

            if (!producto) {
                mostrarCategoria(categoria.id, seccion);
                return;
            }

            seccionActual = seccion;
            actualizarMenu(seccion);
            actualizarHero(seccion);
            actualizarBreadcrumb(seccion, categoria.id);
            categoryPanel.hidden = false;
            actualizarBotones(categoria.id);
            productoEnVista = { categoria, producto, seccion };

            const opcionesProducto = opcionesPorSeccion(producto, seccion);
            const opcionesHtml = opcionesProducto.length
                ? opcionesProducto.map((opcion) => crearTarjetaOpcion(opcion, seccion)).join("")
                : `<div class="empty-state">Las opciones para esta unidad se cargarán más adelante.</div>`;

            catalogView.innerHTML = `
                <button class="back-button" type="button" data-back-category="${categoria.id}">Volver a ${categoria.nombre}</button>
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2 class="section-title">${producto.nombre}</h2>
                    </div>
                </div>
                <div class="products-grid">${opcionesHtml}</div>
            `;

            history.replaceState(null, "", `#${seccion}/${categoria.id}/${slugProducto}`);
        }

        function ejeDisplayName(ejeSlug) {
            if (!ejeSlug) return "";
            const partes = ejeSlug.split("-");
            const ultimo = partes.pop();
            return partes.join("+") + " " + ultimo;
        }

        let galeriaActual = null;

        async function mostrarGaleria(idCategoria, productoNombre, ejeSlug) {
            const categoria = categorias.find((item) => item.id === idCategoria);
            const producto = categoria?.productos.find((item) => item.nombre === productoNombre);
            if (!producto) return;

            const seccion = "fotos";
            seccionActual = seccion;
            actualizarMenu(seccion);
            actualizarHero(seccion);
            categoryPanel.hidden = false;
            actualizarBotones(idCategoria);
            actualizarBreadcrumb(seccion, idCategoria);
            productoEnVista = { categoria, producto, seccion };

            const tituloUnidad = ejeSlug
                ? `${producto.nombre} · ${ejeDisplayName(ejeSlug)}`
                : producto.nombre;

            catalogView.innerHTML = `
                <button class="back-button" type="button" data-galeria-back="${crearSlug(producto.nombre)}">Volver</button>
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2 class="section-title">${tituloUnidad}</h2>
                    </div>
                </div>
                <div class="galeria-loading">Cargando fotos…</div>
            `;

            const numeros = await detectarFotos(idCategoria, productoNombre, ejeSlug);

            if (numeros.length === 0) {
                catalogView.innerHTML = `
                    <button class="back-button" type="button" data-galeria-back="${crearSlug(producto.nombre)}">Volver</button>
                    <div class="section-head">
                        <div class="section-title-wrap">
                            <h2 class="section-title">${tituloUnidad}</h2>
                        </div>
                    </div>
                    <div class="empty-state">Próximamente cargaremos las fotos de esta unidad.</div>
                `;
                const hashParts = ["fotos", idCategoria, crearSlug(producto.nombre)];
                if (ejeSlug) hashParts.push(ejeSlug);
                history.replaceState(null, "", "#" + hashParts.join("/"));
                return;
            }

            const fotos = numeros.map((n) => ({
                numero: n,
                thumb: cloudinaryFotoUrl(idCategoria, productoNombre, ejeSlug, n, "c_fill,w_400,h_400,q_auto,f_auto"),
                main: cloudinaryFotoUrl(idCategoria, productoNombre, ejeSlug, n, "c_fit,w_1400,q_auto,f_auto"),
                full: cloudinaryFotoUrl(idCategoria, productoNombre, ejeSlug, n, "c_fit,w_1920,q_auto,f_auto"),
                original: cloudinaryFotoUrl(idCategoria, productoNombre, ejeSlug, n)
            }));

            galeriaActual = { fotos, productoNombre, ejeSlug, indice: 0 };

            catalogView.innerHTML = `
                <button class="back-button" type="button" data-galeria-back="${crearSlug(producto.nombre)}">Volver</button>
                <div class="section-head">
                    <div class="section-title-wrap">
                        <h2 class="section-title">${tituloUnidad}</h2>
                    </div>
                </div>
                <div class="galeria">
                    <button class="galeria-main" type="button" data-galeria-abrir="0" aria-label="Ampliar foto">
                        <img class="galeria-main-img" id="galeriaMainImg" src="${fotos[0].main}" alt="${producto.nombre} foto 1">
                        <span class="galeria-main-zoom" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/><path d="M11 8v6"/><path d="M8 11h6"/>
                            </svg>
                        </span>
                    </button>
                    <div class="galeria-thumbs">
                        ${fotos.map((foto, i) => `
                            <button class="galeria-thumb${i === 0 ? " active" : ""}" type="button" data-galeria-thumb="${i}" aria-label="Foto ${i + 1}">
                                <img src="${foto.thumb}" alt="Thumbnail ${i + 1}" loading="lazy">
                            </button>
                        `).join("")}
                    </div>
                </div>
            `;

            const hashParts = ["fotos", idCategoria, crearSlug(producto.nombre)];
            if (ejeSlug) hashParts.push(ejeSlug);
            history.replaceState(null, "", "#" + hashParts.join("/"));
        }

        function cambiarFotoPrincipal(indice) {
            if (!galeriaActual) return;
            const foto = galeriaActual.fotos[indice];
            if (!foto) return;
            galeriaActual.indice = indice;
            const mainImg = document.getElementById("galeriaMainImg");
            if (mainImg) mainImg.src = foto.main;
            document.querySelectorAll(".galeria-thumb").forEach((btn, i) => {
                btn.classList.toggle("active", i === indice);
            });
            const abrir = document.querySelector("[data-galeria-abrir]");
            if (abrir) abrir.dataset.galeriaAbrir = String(indice);
        }

        function crearTarjetaOpcion(opcion, seccion = "fichas") {
            if (opcion.variantes?.length && seccion === "fichas") {
                return `
                    <button class="product-card product-card-button button-reset" type="button" data-variantes-opcion="${crearSlug(opcion.nombre)}">
                        <h3 class="product-name">${opcion.nombre}</h3>
                        <p class="product-description">${opcion.descripcion || ""}</p>
                        <hr class="divider">
                        <span class="card-action">Ver opciones</span>
                    </button>
                `;
            }

            if (seccion === "fotos") {
                return `
                    <button class="product-card product-card-button button-reset" type="button" data-galeria-eje="${crearSlug(opcion.nombre)}">
                        <h3 class="product-name">${opcion.nombre}</h3>
                        <hr class="divider">
                        <span class="card-action">Ver fotos</span>
                    </button>
                `;
            }

            const descripcion = opcion.descripcion;
            const textoBoton = "Ver ficha técnica";
            const url = opcion.pdf || PDF_PLACEHOLDER;

            return crearTarjetaAccion(opcion.nombre, descripcion, textoBoton, url);
        }

        menuButtons.forEach((btn) => {
            btn.addEventListener("click", (event) => {
                event.preventDefault();
                event.stopPropagation();
                toggleDrawer(false);
                mostrarSeccion(btn.dataset.section);
                window.scrollTo({ top: 0, behavior: "auto" });
            });
        });

        const searchInput = document.querySelector("#searchInput");
        const searchResults = document.querySelector("#searchResults");
        const searchInputModal = document.querySelector("#searchInputModal");
        const searchResultsModal = document.querySelector("#searchResultsModal");
        const searchModal = document.querySelector("#searchModal");
        const searchModalClose = document.querySelector("#searchModalClose");
        const heroSearchToggle = document.querySelector("#heroSearchToggle");
        const scrollBarSearchToggle = document.querySelector("#scrollBarSearchToggle");

        function normalizar(texto) {
            return texto
                .normalize("NFD")
                .replace(/[̀-ͯ]/g, "")
                .toLowerCase()
                .trim();
        }

        const itemsBusqueda = [];
        categorias.forEach((cat) => {
            cat.productos.forEach((prod) => {
                ["fichas", "fotos"].forEach((seccion) => {
                    itemsBusqueda.push({
                        seccion,
                        seccionLabel: HERO_CONTENT[seccion].titulo,
                        categoriaId: cat.id,
                        categoriaNombre: cat.nombre,
                        productoNombre: prod.nombre,
                        productoSlug: crearSlug(prod.nombre),
                        descripcion: prod.descripcion || "",
                        tieneOpciones: !!opcionesPorSeccion(prod, seccion).length,
                        searchHaystack: normalizar(`${prod.nombre} ${prod.descripcion || ""} ${cat.nombre} ${HERO_CONTENT[seccion].titulo}`)
                    });
                });
            });
        });

        function renderResultados(query, container) {
            const q = normalizar(query);
            if (!q) {
                container.innerHTML = "";
                if (container === searchResults) container.hidden = true;
                return;
            }
            const matches = itemsBusqueda.filter((item) => item.searchHaystack.includes(q));
            if (matches.length === 0) {
                container.innerHTML = `<div class="search-empty">Sin resultados para "${query}"</div>`;
            } else {
                container.innerHTML = matches.slice(0, 30).map((item) => `
                    <button class="search-result-item" type="button" role="option"
                            data-search-seccion="${item.seccion}"
                            data-search-categoria="${item.categoriaId}"
                            data-search-producto="${item.productoSlug}"
                            data-search-tieneopciones="${item.tieneOpciones}">
                        <span class="search-result-path">${item.seccionLabel} › ${item.categoriaNombre}</span>
                        <span class="search-result-name">${item.productoNombre}</span>
                    </button>
                `).join("");
            }
            if (container === searchResults) container.hidden = false;
        }

        function cerrarBusqueda() {
            searchResults.hidden = true;
            searchInput.value = "";
        }

        function abrirModalBusqueda() {
            searchModal.hidden = false;
            // small delay so display:flex applies before transform animates
            requestAnimationFrame(() => {
                searchModal.classList.add("open");
            });
            document.body.classList.add("search-open");
            searchInputModal.value = "";
            searchResultsModal.innerHTML = "";
            setTimeout(() => searchInputModal.focus(), 100);
        }

        function cerrarModalBusqueda() {
            searchModal.classList.remove("open");
            document.body.classList.remove("search-open");
            setTimeout(() => {
                searchModal.hidden = true;
                searchInputModal.value = "";
                searchResultsModal.innerHTML = "";
            }, 240);
        }

        searchInput.addEventListener("input", (e) => renderResultados(e.target.value, searchResults));
        searchInput.addEventListener("focus", () => {
            if (searchInput.value.trim()) renderResultados(searchInput.value, searchResults);
        });

        searchInputModal.addEventListener("input", (e) => renderResultados(e.target.value, searchResultsModal));

        document.addEventListener("click", (event) => {
            if (!event.target.closest("#searchBar")) {
                searchResults.hidden = true;
            }
        });

        function navegarDesdeResultado(item) {
            const seccion = item.dataset.searchSeccion;
            const categoriaId = item.dataset.searchCategoria;
            const productoSlug = item.dataset.searchProducto;
            const tieneOpciones = item.dataset.searchTieneopciones === "true";

            if (tieneOpciones) {
                mostrarProducto(categoriaId, productoSlug, seccion);
            } else {
                mostrarCategoria(categoriaId, seccion);
            }
            window.scrollTo({ top: 0, behavior: "auto" });
        }

        searchResults.addEventListener("click", (event) => {
            const item = event.target.closest("[data-search-seccion]");
            if (!item) return;
            navegarDesdeResultado(item);
            cerrarBusqueda();
        });

        searchResultsModal.addEventListener("click", (event) => {
            const item = event.target.closest("[data-search-seccion]");
            if (!item) return;
            navegarDesdeResultado(item);
            cerrarModalBusqueda();
        });

        heroSearchToggle.addEventListener("click", abrirModalBusqueda);
        scrollBarSearchToggle.addEventListener("click", abrirModalBusqueda);
        searchModalClose.addEventListener("click", cerrarModalBusqueda);

        searchInput.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                cerrarBusqueda();
                searchInput.blur();
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && searchModal.classList.contains("open")) {
                cerrarModalBusqueda();
            }
        });

        const variantesModal = document.querySelector("#variantesModal");
        const variantesModalContent = variantesModal.querySelector(".variantes-modal-content");
        const variantesModalKicker = document.querySelector("#variantesModalKicker");
        const variantesModalTitle = document.querySelector("#variantesModalTitle");
        const variantesModalList = document.querySelector("#variantesModalList");
        const variantesModalClose = document.querySelector("#variantesModalClose");
        const variantesModalOverlay = document.querySelector("#variantesModalOverlay");

        function abrirModalVariantes(producto, opcion) {
            variantesModalKicker.textContent = producto.nombre;
            variantesModalTitle.textContent = opcion.nombre;
            variantesModalList.innerHTML = opcion.variantes.map((v) => `
                <article class="variante-card">
                    <h4 class="variante-name">${v.nombre}</h4>
                    <p class="variante-description">${v.descripcion || ""}</p>
                    <a class="sheet-link" href="${v.pdf}" target="_blank" rel="noopener noreferrer">Ver ficha técnica</a>
                </article>
            `).join("");
            variantesModal.hidden = false;
            requestAnimationFrame(() => variantesModal.classList.add("open"));
            document.body.classList.add("variantes-open");
            variantesModalContent.scrollTop = 0;
        }

        function cerrarModalVariantes() {
            variantesModal.classList.remove("open");
            document.body.classList.remove("variantes-open");
            setTimeout(() => {
                variantesModal.hidden = true;
                variantesModalList.innerHTML = "";
            }, 220);
        }

        variantesModalClose.addEventListener("click", cerrarModalVariantes);
        variantesModalOverlay.addEventListener("click", cerrarModalVariantes);
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && variantesModal.classList.contains("open")) {
                cerrarModalVariantes();
            }
        });

        const adicionalDetalleModal = document.querySelector("#adicionalDetalleModal");
        const adicionalDetalleOverlay = document.querySelector("#adicionalDetalleOverlay");
        const adicionalDetalleClose = document.querySelector("#adicionalDetalleClose");
        const adicionalDetalleNombre = document.querySelector("#adicionalDetalleNombre");
        const adicionalDetalleCategoria = document.querySelector("#adicionalDetalleCategoria");
        const adicionalDetalleDescripcion = document.querySelector("#adicionalDetalleDescripcion");
        const adicionalDetalleUbicacion = document.querySelector("#adicionalDetalleUbicacion");
        const adicionalDetalleFoto = document.querySelector("#adicionalDetalleFoto");

        adicionalDetalleClose.addEventListener("click", cerrarAdicionalDetalle);
        adicionalDetalleOverlay.addEventListener("click", cerrarAdicionalDetalle);
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && adicionalDetalleModal.classList.contains("open")) {
                cerrarAdicionalDetalle();
            }
        });

        const lightbox = document.querySelector("#lightbox");
        const lightboxOverlay = document.querySelector("#lightboxOverlay");
        const lightboxImage = document.querySelector("#lightboxImage");
        const lightboxPrev = document.querySelector("#lightboxPrev");
        const lightboxNext = document.querySelector("#lightboxNext");
        const lightboxClose = document.querySelector("#lightboxClose");
        const lightboxCounter = document.querySelector("#lightboxCounter");
        const lightboxDownload = document.querySelector("#lightboxDownload");
        const lightboxShare = document.querySelector("#lightboxShare");

        let lightboxIndice = 0;

        function abrirLightbox(indice) {
            if (!galeriaActual?.fotos?.length) return;
            lightboxIndice = indice;
            actualizarLightbox();
            lightbox.hidden = false;
            requestAnimationFrame(() => lightbox.classList.add("open"));
            document.body.classList.add("lightbox-open");
        }

        function cerrarLightbox() {
            lightbox.classList.remove("open");
            document.body.classList.remove("lightbox-open");
            setTimeout(() => {
                lightbox.hidden = true;
                lightboxImage.src = "";
            }, 240);
        }

        function actualizarLightbox() {
            const total = galeriaActual.fotos.length;
            if (lightboxIndice < 0) lightboxIndice = total - 1;
            if (lightboxIndice >= total) lightboxIndice = 0;
            const foto = galeriaActual.fotos[lightboxIndice];
            lightboxImage.src = foto.full;
            lightboxImage.alt = `${galeriaActual.productoNombre} foto ${lightboxIndice + 1}`;
            lightboxCounter.textContent = `${lightboxIndice + 1} / ${total}`;
            lightboxDownload.href = foto.original;
            lightboxDownload.download = `${crearSlug(galeriaActual.productoNombre)}-${galeriaActual.ejeSlug || "foto"}-${foto.numero}.jpg`;
            lightboxPrev.style.visibility = total > 1 ? "visible" : "hidden";
            lightboxNext.style.visibility = total > 1 ? "visible" : "hidden";
        }

        lightboxPrev.addEventListener("click", () => { lightboxIndice--; actualizarLightbox(); });
        lightboxNext.addEventListener("click", () => { lightboxIndice++; actualizarLightbox(); });
        lightboxClose.addEventListener("click", cerrarLightbox);
        lightboxOverlay.addEventListener("click", cerrarLightbox);

        lightboxShare.addEventListener("click", async () => {
            if (!galeriaActual) return;
            const foto = galeriaActual.fotos[lightboxIndice];
            const shareData = {
                title: galeriaActual.productoNombre,
                text: `${galeriaActual.productoNombre} - Lambert Remolques`,
                url: foto.original
            };
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (e) {
                    // user cancelled
                }
            } else {
                try {
                    await navigator.clipboard.writeText(foto.original);
                    alert("Link de la foto copiado al portapapeles");
                } catch (e) {
                    prompt("Copiá este link de la foto:", foto.original);
                }
            }
        });

        document.addEventListener("keydown", (event) => {
            if (!lightbox.classList.contains("open")) return;
            if (event.key === "Escape") cerrarLightbox();
            else if (event.key === "ArrowLeft") { lightboxIndice--; actualizarLightbox(); }
            else if (event.key === "ArrowRight") { lightboxIndice++; actualizarLightbox(); }
        });

        let lightboxTouchStartX = null;
        lightbox.addEventListener("touchstart", (e) => {
            if (e.touches.length === 1) lightboxTouchStartX = e.touches[0].clientX;
        }, { passive: true });
        lightbox.addEventListener("touchend", (e) => {
            if (lightboxTouchStartX === null || e.changedTouches.length !== 1) return;
            const dx = e.changedTouches[0].clientX - lightboxTouchStartX;
            if (Math.abs(dx) > 50) {
                if (dx < 0) lightboxIndice++;
                else lightboxIndice--;
                actualizarLightbox();
            }
            lightboxTouchStartX = null;
        });

        categoryList.addEventListener("click", (event) => {
            const button = event.target.closest("[data-category]");
            if (!button) return;
            mostrarCategoria(button.dataset.category, seccionActual);
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        catalogView.addEventListener("click", (event) => {
            const irASeccion = event.target.closest("[data-go-section]");
            if (irASeccion) {
                mostrarSeccion(irASeccion.dataset.goSection);
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
            }

            const volver = event.target.closest("[data-back-category]");
            if (volver) {
                mostrarCategoria(volver.dataset.backCategory, seccionActual);
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
            }

            const variantesBtn = event.target.closest("[data-variantes-opcion]");
            if (variantesBtn && productoEnVista) {
                const slug = variantesBtn.dataset.variantesOpcion;
                const opcion = opcionesPorSeccion(productoEnVista.producto, productoEnVista.seccion).find((o) => crearSlug(o.nombre) === slug);
                if (opcion?.variantes?.length) {
                    abrirModalVariantes(productoEnVista.producto, opcion);
                }
                return;
            }

            const galeriaEjeBtn = event.target.closest("[data-galeria-eje]");
            if (galeriaEjeBtn && productoEnVista) {
                mostrarGaleria(productoEnVista.categoria.id, productoEnVista.producto.nombre, galeriaEjeBtn.dataset.galeriaEje);
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
            }

            const galeriaDirectaBtn = event.target.closest("[data-galeria-directa]");
            if (galeriaDirectaBtn) {
                const categoriaId = document.querySelector(".category-button.active")?.dataset.category || "carrocerias";
                const productoSlug = galeriaDirectaBtn.dataset.galeriaDirecta;
                const cat = categorias.find((c) => c.id === categoriaId);
                const prod = cat?.productos.find((p) => crearSlug(p.nombre) === productoSlug);
                if (prod) {
                    mostrarGaleria(categoriaId, prod.nombre, null);
                    window.scrollTo({ top: 0, behavior: "smooth" });
                }
                return;
            }

            const galeriaBack = event.target.closest("[data-galeria-back]");
            if (galeriaBack && productoEnVista) {
                if (opcionesPorSeccion(productoEnVista.producto, "fotos").length) {
                    mostrarProducto(productoEnVista.categoria.id, crearSlug(productoEnVista.producto.nombre), "fotos");
                } else {
                    mostrarCategoria(productoEnVista.categoria.id, "fotos");
                }
                window.scrollTo({ top: 0, behavior: "smooth" });
                return;
            }

            const galeriaThumb = event.target.closest("[data-galeria-thumb]");
            if (galeriaThumb) {
                cambiarFotoPrincipal(parseInt(galeriaThumb.dataset.galeriaThumb, 10));
                return;
            }

            const adicionalChip = event.target.closest("[data-adicional-chip]");
            if (adicionalChip) {
                adicionalFiltroCategoria = adicionalChip.dataset.adicionalChip;
                renderAdicionalesGrid();
                actualizarChips();
                const hash = adicionalFiltroCategoria === "todos" ? "#adicionales" : `#adicionales/${adicionalFiltroCategoria}`;
                history.replaceState(null, "", hash);
                return;
            }

            const adicionalCard = event.target.closest("[data-adicional-slug]");
            if (adicionalCard) {
                abrirAdicionalDetalle(adicionalCard.dataset.adicionalSlug);
                return;
            }

            const galeriaAbrir = event.target.closest("[data-galeria-abrir]");
            if (galeriaAbrir && galeriaActual) {
                abrirLightbox(parseInt(galeriaAbrir.dataset.galeriaAbrir, 10));
                return;
            }

            const producto = event.target.closest("[data-product]");
            if (!producto) return;

            const categoriaActiva = document.querySelector(".category-button.active")?.dataset.category || "acoplados";
            mostrarProducto(categoriaActiva, producto.dataset.product, seccionActual);
            window.scrollTo({ top: 0, behavior: "smooth" });
        });

        document.addEventListener("keydown", (event) => {
            const numero = Number(event.key);
            if (numero >= 1 && numero <= categorias.length) {
                const seccionCategorias = seccionActual === "fotos" ? "fotos" : "fichas";
                mostrarCategoria(categorias[numero - 1].id, seccionCategorias);
            }
        });

        function iniciar() {
            crearBotonesCategoria();
            const partes = window.location.hash.replace("#", "").split("/").filter(Boolean);

            if (!partes.length) {
                mostrarSeccion("inicio");
                return;
            }

            if (categorias.some((categoria) => categoria.id === partes[0])) {
                mostrarSeccion("fichas", partes[0], partes[1] || "");
                return;
            }

            if (partes[0] === "fotos" && partes[1] && partes[2]) {
                const cat = categorias.find((c) => c.id === partes[1]);
                const prod = cat?.productos.find((p) => crearSlug(p.nombre) === partes[2]);
                if (prod) {
                    const ejeSlug = partes[3] || null;
                    if (opcionesPorSeccion(prod, "fotos").length && !ejeSlug) {
                        mostrarSeccion("fotos", partes[1], partes[2]);
                    } else {
                        mostrarGaleria(partes[1], prod.nombre, ejeSlug);
                    }
                    return;
                }
            }

            mostrarSeccion(partes[0], partes[1] || "acoplados", partes[2] || "");
        }

        iniciar();
    </script>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBbqb2v1L_o5rLh38eOrBYcHNFrRYIxQLU",
    authDomain: "banco-de-unidades.firebaseapp.com",
    projectId: "banco-de-unidades",
    appId: "1:768534143671:web:723425177c89bd23532332"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const INACTIVITY_LIMIT_MS = 30 * 60 * 1000;
  const ACTIVITY_KEY = "lambert:lastActivity";
  const ACTIVITY_EVENTS = ["mousemove", "mousedown", "keydown", "scroll", "touchstart"];
  let monitorIniciado = false;
  let intervaloChequeo = null;

  function registrarActividad() {
    localStorage.setItem(ACTIVITY_KEY, Date.now().toString());
  }

  function chequearInactividad() {
    const ultima = parseInt(localStorage.getItem(ACTIVITY_KEY) || "0", 10);
    if (ultima && Date.now() - ultima > INACTIVITY_LIMIT_MS) {
      auth.signOut();
    }
  }

  function iniciarMonitorInactividad() {
    if (monitorIniciado) return;
    monitorIniciado = true;
    registrarActividad();
    ACTIVITY_EVENTS.forEach((evento) => {
      document.addEventListener(evento, registrarActividad, { passive: true });
    });
    window.addEventListener("focus", chequearInactividad);
    intervaloChequeo = setInterval(chequearInactividad, 60 * 1000);
  }

  function logout() {
    auth.signOut();
  }

  document.getElementById("logoutButton").addEventListener("click", logout);
  document.getElementById("scrollBarLogout").addEventListener("click", logout);
  document.getElementById("drawerLogout").addEventListener("click", logout);

  auth.onAuthStateChanged((user) => {
    if (!user) {
      localStorage.removeItem(ACTIVITY_KEY);
      window.location.replace("login.html");
      return;
    }

    const email = user.email || "";
    document.getElementById("userEmail").textContent = email;
    document.getElementById("scrollBarUser").textContent = email;
    document.getElementById("drawerUserEmail").textContent = email;
    document.getElementById("contenido").style.display = "block";
    iniciarMonitorInactividad();
  });
</script>
