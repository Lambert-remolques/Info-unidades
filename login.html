<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Lambert</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;0,700;1,800;1,900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde: #159947;
            --verde-oscuro: #078334;
            --rojo: #da251d;
            --negro: #262626;
            --grafito: #333333;
            --gris: #e6e6e6;
            --gris-texto: #555555;
            --blanco: #ffffff;
            --sombra-panel: 0 10px 28px rgba(38, 38, 38, 0.10);
            --fuente: "Montserrat", Arial, sans-serif;
            --radio: 3px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--negro);
            font-family: var(--fuente);
            background: #101213;
        }

        button,
        input {
            font: inherit;
        }

        .login-screen {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            min-height: 100vh;
            padding: 48px 24px;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.08), transparent 24%),
                linear-gradient(135deg, #101213 0%, #191c1d 44%, #242728 100%);
        }

        .login-screen::before,
        .login-screen::after {
            content: "";
            position: absolute;
            top: -100px;
            bottom: -120px;
            width: 220px;
            background: rgba(255, 255, 255, 0.045);
            transform: skewX(-24deg);
            pointer-events: none;
        }

        .login-screen::before {
            right: 28%;
        }

        .login-screen::after {
            right: 10%;
            opacity: 0.55;
        }

        .login-brand {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .login-brand .logo {
            width: 200px;
            filter: drop-shadow(0 4px 9px rgba(0, 0, 0, 0.45));
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: min(420px, 100%);
            padding: 36px 32px 30px;
            border-left: 5px solid var(--verde);
            border-radius: var(--radio);
            background: var(--blanco);
            box-shadow: var(--sombra-panel);
        }

        .login-kicker {
            margin: 0 0 6px;
            color: var(--verde);
            font-size: 0.72rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .login-title {
            margin: 0;
            color: var(--negro);
            font-size: clamp(1.55rem, 3.2vw, 1.95rem);
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.95;
        }

        .red-rule {
            width: 64px;
            height: 4px;
            margin: 16px 0 22px;
            background: var(--rojo);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .login-label {
            color: var(--grafito);
            font-size: 0.7rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .login-input {
            height: 44px;
            padding: 0 14px;
            border: 1px solid rgba(38, 38, 38, 0.18);
            border-radius: var(--radio);
            background: #fafafa;
            color: var(--negro);
            font-family: var(--fuente);
            font-size: 0.95rem;
            transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
        }

        .login-input::placeholder {
            color: rgba(85, 85, 85, 0.6);
        }

        .login-input:focus {
            outline: none;
            border-color: var(--verde);
            background: var(--blanco);
            box-shadow: 0 0 0 3px rgba(21, 153, 71, 0.18);
        }

        .login-submit {
            margin-top: 8px;
            min-height: 46px;
            padding: 0 18px;
            border: 0;
            border-radius: var(--radio);
            color: var(--blanco);
            background: linear-gradient(180deg, var(--verde), var(--verde-oscuro));
            box-shadow: inset 0 1px rgba(255, 255, 255, 0.14);
            font-size: 0.78rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
        }

        .login-submit:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
            box-shadow: 0 9px 18px rgba(21, 153, 71, 0.26);
        }

        .login-submit:focus-visible {
            outline: 3px solid rgba(21, 153, 71, 0.38);
            outline-offset: 3px;
        }

        .login-error {
            margin: 4px 0 0;
            min-height: 1.1em;
            color: var(--rojo);
            font-size: 0.82rem;
            font-weight: 700;
        }

        .login-forgot {
            align-self: center;
            margin-top: 6px;
            color: var(--gris-texto);
            font-size: 0.82rem;
            font-weight: 700;
            text-decoration: none;
            transition: color 160ms ease;
        }

        .login-forgot:hover {
            color: var(--verde);
            text-decoration: underline;
        }

        .login-forgot:focus-visible {
            outline: 3px solid rgba(21, 153, 71, 0.38);
            outline-offset: 3px;
            border-radius: var(--radio);
        }

        .login-footer {
            position: relative;
            z-index: 1;
            margin: 0;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            font-weight: 500;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        @media (max-width: 480px) {
            .login-screen {
                padding: 32px 18px;
                gap: 20px;
            }

            .login-brand .logo {
                width: 160px;
            }

            .login-card {
                padding: 28px 22px 24px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="login-screen">
        <div class="login-brand">
            <img class="logo" src="LAMBERT blanco sin fondo.png" alt="Lambert">
        </div>

        <div class="login-card">
            <p class="login-kicker">Acceso interno</p>
            <h1 class="login-title">Iniciar sesión</h1>
            <div class="red-rule" aria-hidden="true"></div>

            <form class="login-form" id="loginForm">
                <div class="login-field">
                    <label class="login-label" for="email">Email</label>
                    <input class="login-input" type="email" id="email" autocomplete="email" placeholder="tu@correo.com" required>
                </div>

                <div class="login-field">
                    <label class="login-label" for="password">Contraseña</label>
                    <input class="login-input" type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>

                <button class="login-submit" type="submit">Ingresar</button>
                <p class="login-error" id="error" role="alert" aria-live="polite"></p>
                <a class="login-forgot" href="https://wa.me/5493442624518?text=Hola%20Oriana%21%20Olvid%C3%A9%20mi%20contrase%C3%B1a%20para%20acceder%20al%20cat%C3%A1logo%20de%20unidades.%20%C2%BFPodr%C3%ADas%20record%C3%A1rmela%3F%20Muchas%20gracias" target="_blank" rel="noopener noreferrer">¿Olvidaste tu contraseña?</a>
            </form>
        </div>

        <p class="login-footer">Unidades · Lambert Remolques</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBbqb2v1L_o5rLh38eOrBYcHNFrRYIxQLU",
            authDomain: "banco-de-unidades.firebaseapp.com",
            projectId: "banco-de-unidades",
            appId: "1:768534143671:web:723425177c89bd23532332"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const ACTIVITY_KEY = "lambert:lastActivity";

        const form = document.getElementById("loginForm");
        const errorEl = document.getElementById("error");

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            errorEl.textContent = "";
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    localStorage.setItem(ACTIVITY_KEY, Date.now().toString());
                })
                .catch(() => {
                    errorEl.textContent = "Datos incorrectos";
                });
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                localStorage.setItem(ACTIVITY_KEY, Date.now().toString());
                window.location.replace("index.html");
            }
        });
    </script>
</body>
</html>
